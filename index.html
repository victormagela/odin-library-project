<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin - Library</title>
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Personal Library</h1>
    </header>

    <main>
        <button class="add-btn" id="open">Add New Book</button>
        <div class="card-container"></div>
    </main>

    <footer>
        <p>&copy; Myself</p>
    </footer>
    
    <div class="modal-container" id="modal-container">
        <div class="modal-window" id="modal-window">
            <form class="book-form" id="book-form">
                <div class="form-fields">
                    <label class="label" for="title">Title</label>
                    <input type="text" name="title" id="title" minlength="2" required>

                    <label class="label" for="author">Author</label>
                    <input type="text" name="author" id="author" minlength="2" required>
                    
                    <label  class="label"for="pages">Number of Pages</label>
                    <input type="number" name="pages" id="pages" min="1" required>
                    
                    <fieldset>
                        <legend class="label">Has Read?</legend>
    
                        <input type="radio" name="has-read" value="yes" id="yes">
                        <label class="label" for="yes">Yes</label>
    
                        <input type="radio" name="has-read" value="no" id="no" checked>
                        <label class="label" for="no">No</label>
                    </fieldset>
                </div>

                <button class="save-btn" id="close" type="submit">Save Book</button>
            </form>
        </div>
    </div>
</body>
</html>
